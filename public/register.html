<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQhubDS - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

    <header class="main-header">
        <h1 class="logo" onclick="window.location.href='/index.html'">🎓 PYQhubDS</h1>
        <div id="nav-actions">
            <button id="theme-toggle-btn" class="theme-btn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </header>

    <main class="container auth-container">
        <section class="card auth-card">
            <h2>Register disabled</h2>
            <p style="opacity:0.9; margin-top:10px;">
              Account creation is not supported in this email-only flow.
            </p>
            <p class="auth-redirect" style="margin-top:16px;">Go to <a href="index.html">Login</a></p>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
