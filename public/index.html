<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQhubDS - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="auth-body">

    <div class="top-bar">
        <div class="logo-container">
            <img src="logo.png" alt="PYQhubDS Logo" class="nav-logo">
            <span class="logo-text">PYQhubDS</span>
        </div>
    </div>

    <main class="auth-container">
        <h1 id="newlyadded_title">Welcome to PYQhubDS!</h1>

        <section class="card auth-card">
            <h2>Sign in with Google</h2>
            <p style="margin-bottom:20px; opacity:0.9;">
              Use your VIT student Google account to continue.
            </p>

            <a class="btn" style="display:inline-block; text-align:center; text-decoration:none;" href="/api/auth/google">
              <i class="fa-brands fa-google" style="margin-right:10px;"></i>
              Sign in with Google
            </a>

            <p class="auth-redirect" style="margin-top:14px; opacity:0.9;">
              Access is restricted to VIT student emails.
            </p>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
