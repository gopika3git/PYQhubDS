<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQhubDS - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="auth-body">

    <div class="top-bar">
        <div class="logo-container">
            <img src="logo.png" alt="PYQhubDS Logo" class="nav-logo">
            <span class="logo-text">PYQhubDS</span>
        </div>
    </div>

    <main class="auth-container">
        <h1 id="newlyadded_title">Welcome to PYQhubDS!</h1>
        <section class="card auth-card">
            <h2>Sign in</h2>
            <p style="margin-bottom:20px; opacity:0.9;">
              Use your VIT student Google account to continue.
            </p>

            <form id="login-form" class="form-group" style="margin-top:16px;">
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="VIT Email" required />
                </div>

                <button type="submit" id="login-btn" class="btn" style="margin-top:14px;">Send Sign-in Link</button>
                <p id="login-status" class="auth-redirect" style="margin-top:12px; opacity:0.9;"></p>
            </form>

            <p class="auth-redirect" style="margin-top:14px;">
              Use your VIT student email. (This flow currently validates that the email exists.)
            </p>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
