<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQhubDS - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="top-bar">
        <button id="theme-toggle-btn" class="theme-btn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <main class="auth-container">
        <section class="card auth-card">
            <h2>Login / Register</h2>
            <div class="form-group">
                <input type="text" id="auth-name" placeholder="Full Name (for registration)">
                <input type="email" id="auth-email" placeholder="Email Address" required>
                
                <div class="password-wrapper">
                    <input type="password" id="auth-password" placeholder="Password" required>
                    <i class="fa-solid fa-eye" id="toggle-password-eye"></i>
                </div>
                
                <div class="auth-buttons">
                    <button id="login-btn" class="btn">Login</button>
                    <button id="register-btn" class="btn secondary">Register</button>
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
