<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQhubDS - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="auth-body">

    <div class="top-bar">
        <div class="logo-container">
            <img src="logo.png" alt="PYQhubDS Logo" class="nav-logo">
            <span class="logo-text">PYQhubDS</span>
        </div>
    </div>

    <main class="auth-container">
        <h1 id="newlyadded_title">Welcome to PYQhubDS!</h1>
        <section class="card auth-card">
            <h2>Login</h2>
            <div class="form-group">

                <input type="email" id="auth-email" placeholder="Email Address" required>
                
                <div class="password-wrapper">
                    <input type="password" id="auth-password" placeholder="Password" required>
                    <i class="fa-solid fa-eye" id="toggle-password-eye"></i>
                </div>
                
                <div class="auth-buttons">
                    <button id="login-btn" class="btn">Login</button>
                    <p class="auth-redirect">Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
